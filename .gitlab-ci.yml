variables:
  # General variables for the project
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

.default: &default
  only:
    - merge_requests
    - main
    - id-v2
    - nonceGenerationFix
    - web

.default_tag: &default_tag
  tags:
    - backend-docker-large

# Using the PhonePe internal Maven image
image: docker.phonepe.com/ci/ubuntu/jammy/jdk/openjdk/17/maven/3.9.9:latest

stages:
  - build
  - deploy

"Build Snapshot":
  stage: build
  <<: *default
  <<: *default_tag
  script:
    - mvn clean package -U -DskipTests=true -Denforcer.skip
  # Removed 'when: manual' so it runs automatically on push/MR to give you quick feedback

"Deploy Snapshot":
  stage: deploy
  <<: *default_tag
  <<: *default
  allow_failure: false
  script:
    # This pushes the 1.1.3-SNAPSHOT to PhonePe Artifactory
    - mvn deploy -U -DskipTests=true -Denforcer.skip -Dmaven.deploy.skip=false
  when: manual